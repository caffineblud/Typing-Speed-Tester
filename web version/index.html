<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Speed Tester V3.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>⌨️ Typing Speed Tester</h1>

        <div class="difficulty-buttons">
            <button onclick="setDifficulty('easy')">Easy</button>
            <button onclick="setDifficulty('medium')">Medium</button>
            <button onclick="setDifficulty('hard')">Hard</button>
        </div>

        <div id="sentence-box"></div>

        <textarea
            id="typing-box"
            placeholder="Start typing here..."
        ></textarea>

        <div class="stats">
            <div id="timer">Time: 60s</div>
            <div id="wpm">WPM: 0</div>
            <div id="accuracy">Accuracy: 0%</div>
        </div>

        <div class="highscores">
            <div id="best-wpm">Best WPM: 0</div>
            <div id="best-accuracy">Best Accuracy: 0%</div>
        </div>

        <button id="restart-btn">Restart</button>

    </div>

    <script src="sentences.js"></script>
    <script src="script.js"></script>

</body>
</html>
